# QBNex Configuration File
# Copyright © 2026 thirawat27
# Version: 1.0.0

[general]
# QBNex Compiler Configuration
version = 1.0.0
owner = thirawat27
year = 2026
project_name = QBNex
repository = https://github.com/thirawat27/QBNex

[compiler]
# Default compilation settings
default_output_dir = ./bin
optimization_level = 2
verbose = false
debug_mode = false
show_progress = true
clean_temp = true

# Compilation behavior
auto_run = false
generate_exe = true
strip_symbols = false

[paths]
# Directory paths
include_dir = ./include
lib_dir = ./lib
temp_dir = ./tmp
asset_dir = ./assets
config_dir = ./config

[runtime]
# Runtime library settings
audio_enabled = true
opengl_version = 2.1
max_screen_width = 1920
max_screen_height = 1080
default_fps = 60

[output]
# Output formatting
show_compilation_time = true
show_file_size = true
custom_banner = true
disable_loading_bar = true
message_style = qbnex

[system]
# System-specific settings
max_memory_mb = 512
thread_pool_size = 4
cache_enabled = true
cache_dir = ./cache

[logging]
# Logging configuration
log_enabled = false
log_level = info
log_file = ./logs/qbnex.log
log_rotation = true
max_log_size_mb = 10
