name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check workspace
        run: cargo check --workspace

  test:
    name: Test Matrix (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run crate regression suites
        run: cargo test -p tokenizer -p syntax_tree -p analyzer -p vm_engine -p native_codegen -p hal_layer

      - name: Run QB64 parser regression
        run: cargo test -p syntax_tree --test qb64_source_parse -- --nocapture

      - name: Run compile smoke suite
        run: cargo test -p cli_tool --test compile_smoke_test

      - name: Run QBasic conformance suite
        run: cargo test -p cli_tool --test qbasic_conformance -- --nocapture

      - name: Validate release surface
        run: cargo run -q -p cli_tool -- --validate-release

      - name: Run sharded CLI regression suite
        run: python tests/runners/run_cli_regression_suite.py --workspace . --timeout-seconds 120

      - name: Build release CLI
        run: cargo build --release -p cli_tool

      - name: Upload release binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: qb-${{ runner.os }}
          path: target/release/qb.exe

      - name: Upload release binary (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: qb-${{ runner.os }}
          path: target/release/qb

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - quality
      - test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t qbnex:ci .
