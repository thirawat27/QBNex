name: Pull Request CI

on:
  pull_request:
    branches: ["main"]

jobs:
  build:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message || '', 'ci-skip') }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            runs_on: ubuntu-latest
            artifact_suffix: lnx
            artifact_path: qb
            build_command: QBNEX_CI=1 bash ./setup_lnx.sh
          - target: macos
            runs_on: macos-latest
            artifact_suffix: osx
            artifact_path: qb
            build_command: QBNEX_CI=1 bash ./setup_osx.command
          - target: windows-x64
            runs_on: windows-latest
            artifact_suffix: win-x64
            artifact_path: qb.exe
            platform: x64
            mingw_arch: x64
    env:
      QBNEX_CI: "1"
      PLATFORM: ${{ matrix.platform || '' }}
      QBNEX_MINGW_ARCH: ${{ matrix.mingw_arch || '' }}
      QBNEX_BUNDLE_DIR: dist/bundle/qbnex
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libglu1-mesa-dev libncurses-dev

      - name: Build compiler (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.build_command }}

      - name: Build compiler (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: setup_win.cmd

      - name: Stage portable bundle (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: bash ./.github/scripts/portable_bundle.sh "${{ matrix.artifact_path }}" "${{ env.QBNEX_BUNDLE_DIR }}"

      - name: Stage portable bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .github/scripts/portable_bundle.ps1 -BinaryPath "${{ matrix.artifact_path }}" -OutputDir "${{ env.QBNEX_BUNDLE_DIR }}" -WrapperPath "qb.cmd"

      - name: Upload compiler artifact
        uses: actions/upload-artifact@v4
        with:
          name: qbnex_pr_${{ github.sha }}_${{ matrix.artifact_suffix }}
          path: ${{ github.workspace }}/${{ env.QBNEX_BUNDLE_DIR }}
          if-no-files-found: error
