name: Push CI

on:
  push:
    branches: [ "main" ]

jobs:
  linux-build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci-skip')"
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: sudo apt update && sudo apt install libglu1-mesa-dev libncurses-dev
    - name: Build compiler
      run: QBNEX_CI=1 bash ./setup_lnx.sh
    - name: Run smoke and benchmark suite
      run: |
        chmod +x tests/*.sh
        ./tests/diagnostics_smoke.sh
        ./tests/warnings_smoke.sh
        ./tests/labels_smoke.sh
        ./tests/encoding_smoke.sh
        ./tests/cli_smoke.sh
        ./tests/stdlib_smoke.sh
        ./tests/benchmark_smoke.sh
