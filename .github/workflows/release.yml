name: Release CI

on:
  workflow_dispatch:
    branches: [ "main" ]

jobs:
  linux-build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci-skip')"
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: sudo apt update && sudo apt install libglu1-mesa-dev libncurses-dev
    - name: Build compiler
      run: QBNEX_CI=1 bash ./setup_lnx.sh
    - name: Run smoke and benchmark suite
      run: |
        chmod +x tests/*.sh
        ./tests/diagnostics_smoke.sh
        ./tests/warnings_smoke.sh
        ./tests/labels_smoke.sh
        ./tests/encoding_smoke.sh
        ./tests/cli_smoke.sh
        ./tests/stdlib_smoke.sh
        ./tests/benchmark_smoke.sh
    - name: Upload
      uses: actions/upload-artifact@v3
      with: 
        name: qbnex_${{ github.ref_name }}_${{ github.sha }}_lnx
        path: ${{ github.workspace }}/qb

  macos-build:
    runs-on: macos-latest
    if: "!contains(github.event.head_commit.message, 'ci-skip')"
    steps:
    - uses: actions/checkout@v4
    - name: Build compiler
      run: QBNEX_CI=1 bash ./setup_osx.command
    - name: Run smoke and benchmark suite
      run: |
        chmod +x tests/*.sh
        ./tests/diagnostics_smoke.sh
        ./tests/warnings_smoke.sh
        ./tests/labels_smoke.sh
        ./tests/encoding_smoke.sh
        ./tests/cli_smoke.sh
        ./tests/stdlib_smoke.sh
        ./tests/benchmark_smoke.sh
    - name: Upload
      uses: actions/upload-artifact@v3
      with: 
        name: qbnex_${{ github.ref_name }}_${{ github.sha }}_osx
        path: ${{ github.workspace }}/qb

  windows-x86-build:
    runs-on: windows-latest
    if: "!contains(github.event.head_commit.message, 'ci-skip')"
    env:
      PLATFORM: x86
      QBNEX_CI: "1"
      QBNEX_MINGW_ARCH: x86
    steps:
    - uses: actions/checkout@v4
    - name: Build compiler
      run: cmd /c setup_win.cmd
    - name: Run smoke and benchmark suite
      run: |
        cmd /c tests\diagnostics_smoke.cmd
        cmd /c tests\warnings_smoke.cmd
        cmd /c tests\labels_smoke.cmd
        cmd /c tests\encoding_smoke.cmd
        cmd /c tests\cli_smoke.cmd
        cmd /c tests\stdlib_smoke.cmd
        cmd /c tests\benchmark_smoke.cmd
    - name: Upload
      uses: actions/upload-artifact@v3
      if: always()
      with: 
        name: qbnex_${{ github.ref_name }}_${{ github.sha }}_win-x86
        path: ${{ github.workspace }}\qb.exe

  windows-x64-build:
    runs-on: windows-latest
    if: "!contains(github.event.head_commit.message, 'ci-skip')"
    env:
      PLATFORM: x64
      QBNEX_CI: "1"
      QBNEX_MINGW_ARCH: x64
    steps:
    - uses: actions/checkout@v4
    - name: Build compiler
      run: cmd /c setup_win.cmd
    - name: Run smoke and benchmark suite
      run: |
        cmd /c tests\diagnostics_smoke.cmd
        cmd /c tests\warnings_smoke.cmd
        cmd /c tests\labels_smoke.cmd
        cmd /c tests\encoding_smoke.cmd
        cmd /c tests\cli_smoke.cmd
        cmd /c tests\stdlib_smoke.cmd
        cmd /c tests\benchmark_smoke.cmd
    - name: Upload
      uses: actions/upload-artifact@v3
      with: 
        name: qbnex_${{ github.ref_name }}_${{ github.sha }}_win-x64
        path: ${{ github.workspace }}\qb.exe

