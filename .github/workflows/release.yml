name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Package Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            binary: target/release/qb
          - os: macos-latest
            target: macos-x64
            binary: target/release/qb
          - os: windows-latest
            target: windows-x64
            binary: target/release/qb.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Derive release version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Validate release surface
        run: cargo run -q -p cli_tool -- --validate-release

      - name: Build release CLI
        run: cargo build --release -p cli_tool

      - name: Package release bundle
        run: python scripts/package_release.py --binary ${{ matrix.binary }} --version ${{ steps.version.outputs.value }} --target ${{ matrix.target }} --output-dir dist

      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
