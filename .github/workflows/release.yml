name: Release CI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Git tag to create or update the release for
        required: true
        type: string
      release_name:
        description: Optional display name for the GitHub release
        required: false
        default: ""
        type: string
      draft:
        description: Create the release as a draft
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            runs_on: ubuntu-latest
            artifact_suffix: lnx
            artifact_path: qb
            build_command: QBNEX_CI=1 bash ./setup_lnx.sh
          - target: macos
            runs_on: macos-latest
            artifact_suffix: osx
            artifact_path: qb
            build_command: QBNEX_CI=1 bash ./setup_osx.command
          - target: windows-x86
            runs_on: windows-latest
            artifact_suffix: win-x86
            artifact_path: qb.exe
            platform: x86
            mingw_arch: x86
          - target: windows-x64
            runs_on: windows-latest
            artifact_suffix: win-x64
            artifact_path: qb.exe
            platform: x64
            mingw_arch: x64
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
      QBNEX_CI: "1"
      PLATFORM: ${{ matrix.platform || '' }}
      QBNEX_MINGW_ARCH: ${{ matrix.mingw_arch || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libglu1-mesa-dev libncurses-dev

      - name: Build compiler (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.build_command }}

      - name: Build compiler (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: setup_win.cmd

      - name: Package compiler artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar -czf "dist/qbnex_${{ env.RELEASE_TAG }}_${{ matrix.artifact_suffix }}.tar.gz" "${{ matrix.artifact_path }}"

      - name: Package compiler artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "${{ matrix.artifact_path }}" -DestinationPath "dist/qbnex_${{ env.RELEASE_TAG }}_${{ matrix.artifact_suffix }}.zip" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_suffix }}
          path: ${{ github.workspace }}/dist/qbnex_${{ env.RELEASE_TAG }}_${{ matrix.artifact_suffix }}.*
          if-no-files-found: error

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
      RELEASE_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_name || '' }}
      RELEASE_DRAFT: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: ${{ env.RELEASE_NAME != '' && env.RELEASE_NAME || env.RELEASE_TAG }}
          draft: ${{ env.RELEASE_DRAFT == 'true' }}
          generate_release_notes: true
          files: release-assets/*
